<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">Flujo regla determinista y modelo no trivial</title>
  <desc id="desc">Diagrama del flujo de entrenamiento y evaluacion usando regla para defaults previos y modelo para casos sin defaults.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#243447"/>
    </marker>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#1f2937" flood-opacity="0.14"/>
    </filter>
    <style>
      .bg { fill: #f5f7fb; }
      .title { fill: #172033; font-family: Arial, Helvetica, sans-serif; font-size: 42px; font-weight: 700; }
      .subtitle { fill: #536175; font-family: Arial, Helvetica, sans-serif; font-size: 22px; }
      .section { fill: #334155; font-family: Arial, Helvetica, sans-serif; font-size: 23px; font-weight: 700; letter-spacing: 0; }
      .box { fill: #ffffff; stroke: #d8dee9; stroke-width: 2; rx: 8; filter: url(#softShadow); }
      .box-blue { fill: #e9f2ff; stroke: #86b7f2; stroke-width: 2; rx: 8; filter: url(#softShadow); }
      .box-green { fill: #e9f8f0; stroke: #78c99a; stroke-width: 2; rx: 8; filter: url(#softShadow); }
      .box-red { fill: #fff0f0; stroke: #f19a9a; stroke-width: 2; rx: 8; filter: url(#softShadow); }
      .box-amber { fill: #fff7e5; stroke: #e8bd5b; stroke-width: 2; rx: 8; filter: url(#softShadow); }
      .label { fill: #172033; font-family: Arial, Helvetica, sans-serif; font-size: 24px; font-weight: 700; }
      .text { fill: #334155; font-family: Arial, Helvetica, sans-serif; font-size: 19px; }
      .small { fill: #536175; font-family: Arial, Helvetica, sans-serif; font-size: 16px; }
      .rule { fill: #991b1b; font-family: Arial, Helvetica, sans-serif; font-size: 20px; font-weight: 700; }
      .metric { fill: #14532d; font-family: Arial, Helvetica, sans-serif; font-size: 20px; font-weight: 700; }
      .arrow { stroke: #243447; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #64748b; stroke-width: 3; fill: none; stroke-dasharray: 9 8; marker-end: url(#arrow); }
      .lane { fill: none; stroke: #cbd5e1; stroke-width: 2; stroke-dasharray: 7 9; rx: 8; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="980"/>

  <text class="title" x="80" y="82">Flujo: regla determinista + modelo para casos sin default</text>
  <text class="subtitle" x="80" y="120">La regla resuelve los defaults previos; el modelo aprende solo la parte no trivial.</text>

  <rect class="lane" x="62" y="158" width="1476" height="332"/>
  <text class="section" x="88" y="198">Entrenamiento</text>

  <rect class="lane" x="62" y="532" width="1476" height="352"/>
  <text class="section" x="88" y="572">Prediccion y evaluacion</text>

  <rect class="box-blue" x="115" y="245" width="255" height="110"/>
  <text class="label" x="145" y="285">Dataset completo</text>
  <text class="text" x="145" y="317">Incluye columna</text>
  <text class="small" x="145" y="343">previous defaults</text>

  <rect class="box" x="470" y="245" width="255" height="110"/>
  <text class="label" x="500" y="285">Split train/test</text>
  <text class="text" x="500" y="317">Antes de filtrar</text>
  <text class="small" x="500" y="343">test representativo</text>

  <rect class="box-amber" x="825" y="218" width="300" height="164"/>
  <text class="label" x="855" y="258">Train no defaults</text>
  <text class="text" x="855" y="292">Filtrar: defaults = No</text>
  <text class="text" x="855" y="322">Borrar columna defaults</text>
  <text class="small" x="855" y="352">queda una dimension menos</text>

  <rect class="box-green" x="1230" y="245" width="255" height="110"/>
  <text class="label" x="1260" y="285">Modelo</text>
  <text class="text" x="1260" y="317">Entrena la parte</text>
  <text class="small" x="1260" y="343">no trivial</text>

  <path class="arrow" d="M 370 300 L 462 300"/>
  <path class="arrow" d="M 725 300 L 817 300"/>
  <path class="arrow" d="M 1125 300 L 1222 300"/>

  <rect class="box-blue" x="115" y="642" width="255" height="110"/>
  <text class="label" x="145" y="682">Test completo</text>
  <text class="text" x="145" y="714">Mantiene defaults</text>
  <text class="small" x="145" y="740">mismo espacio original</text>

  <rect class="box" x="470" y="625" width="255" height="144"/>
  <text class="label" x="500" y="665">Regla</text>
  <text class="rule" x="500" y="700">defaults = Yes</text>
  <text class="text" x="500" y="732">prediccion = 0</text>

  <rect class="box-amber" x="825" y="625" width="300" height="144"/>
  <text class="label" x="855" y="665">Caso No</text>
  <text class="text" x="855" y="700">Borrar columna defaults</text>
  <text class="text" x="855" y="732">pasar al modelo</text>

  <rect class="box-green" x="1230" y="625" width="255" height="144"/>
  <text class="label" x="1260" y="665">Predicciones</text>
  <text class="text" x="1260" y="700">Unir regla + modelo</text>
  <text class="metric" x="1260" y="732">accuracy global</text>

  <path class="arrow" d="M 370 697 L 462 697"/>
  <path class="arrow" d="M 725 697 L 817 697"/>
  <path class="arrow" d="M 1125 697 L 1222 697"/>

  <path class="dash" d="M 1358 355 C 1358 455 975 510 975 616"/>
  <text class="small" x="1115" y="515">el modelo solo se usa si defaults = No</text>

  <rect class="box-red" x="470" y="800" width="655" height="52"/>
  <text class="text" x="500" y="833">Reportar tambien accuracy, precision, recall y F1 solo en casos sin defaults</text>

  <path class="arrow" d="M 1330 769 C 1330 825 1210 826 1134 826"/>
</svg>
